<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    lang="id">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | ZakaFlow'">ZakaFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        /* Sage & forest — hijab & spanduk di bg.jpg */
                        primary: {
                            50:  '#f4f7f2',
                            100: '#e3ebe0',
                            200: '#c9d8c4',
                            300: '#a3b89c',
                            400: '#7d9a75',
                            500: '#5f8260',
                            600: '#4d6b4e',
                            700: '#3f5840',
                            800: '#334833',
                            900: '#2a3b29',
                            950: '#1a2619',
                        },
                        /* Terracotta & golden hour — atap, batik, cahaya matahari */
                        accent: {
                            50:  '#fdf8f3',
                            100: '#faeee3',
                            200: '#f4d9c4',
                            300: '#e8bc94',
                            400: '#d9966a',
                            500: '#c97d4f',
                            600: '#a8643d',
                            700: '#8a5032',
                            800: '#6f4129',
                            900: '#5a3522',
                        },
                        /* Krem hangat — kardus & langit senja */
                        surface: {
                            50:  '#faf7f2',
                            100: '#f0ebe3',
                            200: '#e2d9cc',
                        },
                    },
                },
            },
        };
    </script>
</head>
<body class="bg-surface-50 text-stone-800 min-h-screen flex flex-col">

<nav th:fragment="navbar" class="bg-primary-900 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <a th:href="@{/}" class="text-xl font-bold tracking-tight hover:text-accent-200 transition">ZakaFlow</a>
        <div class="flex gap-1 text-sm font-medium">
            <a th:href="@{/programs}" class="hover:text-accent-200 hover:bg-accent-500 px-3 py-2 rounded-lg transition">Program</a>
            <a th:href="@{/categories}" class="hover:text-accent-200 hover:bg-accent-500 px-3 py-2 rounded-lg transition">Kategori</a>
            <a th:href="@{/transactions}" class="hover:text-accent-200 hover:bg-accent-500 px-3 py-2 rounded-lg transition">Riwayat</a>

            <a sec:authorize="!isAuthenticated()"
                th:href="@{/login}"
                class="hover:text-accent-200 bg-accent-500 px-3 py-2 mx-2 rounded-lg transition">Masuk</a>

            <div sec:authorize="isAuthenticated()"
                class="relative group mx-2"
                th:with="uname=${#authentication.name},
                        initial=${#strings.length(uname) >= 2
                            ? #strings.toUpperCase(#strings.substring(uname, 0, 2))
                            : #strings.toUpperCase(uname)}">
                <a th:href="@{/profile}"
                    class="flex items-center gap-2 rounded-full focus:outline-none focus:ring-2 focus:ring-accent-300 focus:ring-offset-2 focus:ring-offset-primary-900"
                    th:attr="aria-label=${'Profil ' + uname}">
                    <span class="w-9 h-9 rounded-full bg-accent-500 text-white text-sm font-bold flex items-center justify-center ring-2 ring-white/20 select-none"
                        th:text="${initial}">ZF</span>
                </a>
                <div class="absolute right-0 top-full pt-2 w-48 hidden group-hover:block group-focus-within:block z-50">
                    <div class="bg-white text-stone-800 rounded-lg shadow-xl border border-surface-200 overflow-hidden">
                        <div class="px-4 py-3 border-b border-surface-200">
                            <p class="text-xs text-stone-500">Masuk sebagai</p>
                            <p class="font-semibold truncate" th:text="${uname}">username</p>
                        </div>
                        <div class="p-2 border-b border-surface-200">
                            <a th:href="@{/profile}"
                                class="block px-3 py-2 text-sm rounded-md hover:bg-surface-100 text-primary-700 font-medium transition">
                                Profil Saya
                            </a>
                        </div>
                        <form th:action="@{/logout}" method="post" class="p-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit"
                                    class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-surface-100 text-red-600 transition">
                                Keluar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-surface-50 border-t border-surface-200 py-6 text-center text-sm text-stone-500 mt-auto">
    &copy; 2026 ZakaFlow — Sistem Informasi Pengelolaan Zakat &amp; Donasi
</footer>

</body>
</html>
